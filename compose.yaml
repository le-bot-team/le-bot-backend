networks:
  internal:
    driver: bridge

services:
  app:
    build:
      context: .
      dockerfile: app.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://lebot:lebot@postgres:5432/lebot
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: lebot
      POSTGRES_PASSWORD: lebot
      POSTGRES_DB: lebot
      POSTGRES_INITDB_ARGS: '--data-checksums'
    networks:
      - internal
    ports:
        - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  redis:
    image: redis:8
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
volumes:
  pgdata:
  redisdata:
